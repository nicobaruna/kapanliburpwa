name: Create GitHub Stories

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: 'Nomor GitHub Project (default: 2)'
        required: false
        default: '2'

jobs:
  create-stories:
    name: Push User Stories ke GitHub Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Labels
        run: |
          for LABEL in "story:7057ff" "user-story:0075ca" "enhancement:a2eeef" "testing:e4e669"; do
            NAME=$(echo $LABEL | cut -d: -f1)
            COLOR=$(echo $LABEL | cut -d: -f2)
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"name\": \"$NAME\", \"color\": \"$COLOR\"}" \
              "https://api.github.com/repos/${{ github.repository }}/labels" \
              > /dev/null || true
          done
          echo "Labels siap."

      - name: Run create-stories script
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_PROJECT_NUMBER: ${{ github.event.inputs.project_number }}
        run: |
          chmod +x scripts/create-github-stories.sh
          bash scripts/create-github-stories.sh
